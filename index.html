<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="K Tube Downloader - Free YouTube Video and MP3 Downloader. Fast, unlimited, no login required.">
    <title>K Tube Downloader • Free YouTube Video & MP3 Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a0a; color: white; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
        .hero-bg { background: linear-gradient(135deg, #1a0000, #000); }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); }
        .red-button { background: linear-gradient(90deg, #ff0033, #ff3366); }
        .option-card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgb(255 0 51 / 0.4); }
        .floating-loader {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); padding: 24px 48px; border-radius: 9999px;
            box-shadow: 0 0 50px rgba(255,0,51,0.6); z-index: 99999; display: none;
            align-items: center; gap: 16px; border: 2px solid #ff0033;
        }
        .spinner { animation: spin 1.2s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- Top Ad Banner (High visibility for earnings) -->
<div class="bg-red-900/30 py-3 text-center text-sm border-b border-red-500/30">
    <span class="text-xs uppercase tracking-widest text-red-400">Sponsored • Support Free Downloads</span>
</div>

<div class="hero-bg min-h-screen py-20">
    <div class="max-w-5xl mx-auto px-6 text-center">
        <div class="flex justify-center mb-6">
            <div class="flex items-center gap-x-3">
                <div class="w-12 h-12 bg-gradient-to-br from-red-600 to-red-500 rounded-2xl flex items-center justify-center text-4xl rotate-12">🔥</div>
                <h1 class="heading-font text-6xl">K Tube</h1>
            </div>
        </div>
        <p class="text-3xl text-gray-400 mb-4">Free YouTube Video & MP3 Downloader</p>
        <p class="text-xl text-gray-500">No login • Unlimited downloads • Fast & Safe</p>

        <div class="glass max-w-2xl mx-auto p-6 rounded-3xl flex gap-4 items-center mt-12">
            <i class="fa-brands fa-youtube text-4xl text-red-500"></i>
            <input id="urlInput" type="text" placeholder="Paste YouTube link here..." 
                   class="flex-1 bg-transparent text-lg outline-none" onkeydown="if(event.key==='Enter') simulateFetch()">
            <button onclick="clearInput()" class="text-gray-400 hover:text-white text-3xl px-4">×</button>
            <button onclick="simulateFetch()" class="red-button px-14 py-5 rounded-3xl font-semibold text-xl">GO</button>
        </div>

        <p id="status" class="mt-8 min-h-[32px] text-yellow-400 flex items-center justify-center gap-2"></p>
    </div>
</div>

<!-- Floating Loader -->
<div id="floatingLoader" class="floating-loader">
    <i class="fa-solid fa-spinner spinner text-4xl text-red-500"></i>
    <span id="loaderText" class="text-xl font-medium">Processing your request...</span>
</div>

<!-- Results -->
<div id="resultsSection" class="hidden max-w-5xl mx-auto px-6 py-12">
    <div class="glass rounded-3xl p-8">
        <div class="flex flex-col md:flex-row gap-8">
            <div class="md:w-2/5">
                <img id="resultThumb" class="w-full rounded-2xl shadow-2xl" alt="">
                <h3 id="resultTitle" class="mt-6 text-2xl font-semibold"></h3>
                <p id="resultDuration" class="text-gray-400 mt-2"></p>
            </div>
            <div class="md:w-3/5">
                <h3 class="text-xl font-semibold mb-6 flex items-center gap-3"><i class="fa-solid fa-video text-red-500"></i> Video (MP4)</h3>
                <div id="mp4Options" class="grid grid-cols-2 gap-4 mb-12"></div>

                <h3 class="text-xl font-semibold mb-6 flex items-center gap-3"><i class="fa-solid fa-music text-red-500"></i> Audio Only (MP3)</h3>
                <div id="mp3Options" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            </div>
        </div>
    </div>
</div>

<!-- Feedback Box -->
<section class="max-w-4xl mx-auto px-6 py-20 border-t border-white/10">
    <div class="text-center mb-12">
        <h2 class="heading-font text-5xl mb-4 text-white">Report an Issue or Give Feedback</h2>
        <p class="text-red-400 text-lg">Having trouble with MP3 download or any other issue? Let us know.</p>
    </div>
    
    <div class="glass rounded-3xl p-10">
        <form id="feedbackForm" class="space-y-6">
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm mb-2 text-gray-300">Your Name</label>
                    <input type="text" id="name" required class="w-full bg-[#111] border border-gray-600 rounded-2xl px-5 py-4 outline-none focus:border-red-500">
                </div>
                <div>
                    <label class="block text-sm mb-2 text-gray-300">Email Address</label>
                    <input type="email" id="email" required class="w-full bg-[#111] border border-gray-600 rounded-2xl px-5 py-4 outline-none focus:border-red-500">
                </div>
            </div>
            
            <div>
                <label class="block text-sm mb-2 text-gray-300">Issue Type</label>
                <select id="issueType" class="w-full bg-[#111] border border-gray-600 rounded-2xl px-5 py-4 outline-none focus:border-red-500">
                    <option value="MP3 not working">MP3 Audio not downloading</option>
                    <option value="Video issue">Video download issue</option>
                    <option value="Slow speed">Download speed too slow</option>
                    <option value="Other">Other issue</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm mb-2 text-gray-300">Your Message</label>
                <textarea id="message" rows="5" required class="w-full bg-[#111] border border-gray-600 rounded-3xl px-5 py-4 outline-none focus:border-red-500" placeholder="Describe the problem..."></textarea>
            </div>
            
            <button type="button" onclick="submitFeedback()" 
                    class="red-button w-full py-5 rounded-3xl font-semibold text-lg flex items-center justify-center gap-3">
                <i class="fa-solid fa-paper-plane"></i> Send Feedback
            </button>
        </form>
    </div>
</section>

<script>
async function simulateFetch() {
    const status = document.getElementById('status');
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { status.innerHTML = "❌ Please paste a YouTube link first!"; return; }

    status.innerHTML = `<i class="fa-solid fa-spinner spinner"></i> Fetching video information...`;
    
    try {
        // Using a public reliable API (cobalt.tools style)
        const response = await fetch(`https://api.cobalt.tools/api/json`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({ url: url })
        });
        
        const data = await response.json();

        if (data.status !== "success") throw new Error("Failed to fetch");

        document.getElementById('resultsSection').classList.remove('hidden');
        document.getElementById('resultTitle').textContent = data.title || "YouTube Video";
        document.getElementById('resultThumb').src = data.thumbnail || '';

        // Simplified options for stability
        document.getElementById('mp4Options').innerHTML = `
            <div onclick="startDownload('${data.url}', false, 'Video MP4')" class="option-card glass p-6 rounded-3xl cursor-pointer text-center">
                <i class="fa-solid fa-video text-4xl mb-4 text-red-500"></i>
                <div class="font-semibold">MP4 Video</div>
                <div class="text-sm text-gray-400">Best Quality</div>
            </div>
        `;

        document.getElementById('mp3Options').innerHTML = `
            <div onclick="startDownload('${data.audio || data.url}', true, 'MP3 Audio')" class="option-card glass p-6 rounded-3xl cursor-pointer text-center">
                <i class="fa-solid fa-music text-4xl mb-4 text-red-500"></i>
                <div class="font-semibold">MP3 Audio</div>
                <div class="text-sm text-gray-400">320kbps</div>
            </div>
        `;

        status.innerHTML = `<i class="fa-solid fa-check text-green-400"></i> Video ready — choose format below`;

    } catch (e) {
        status.innerHTML = "❌ Failed to load video. Please try again or use a different link.";
    }
}

function startDownload(downloadUrl, isMp3, formatName) {
    const loader = document.getElementById('floatingLoader');
    const loaderText = document.getElementById('loaderText');
    loaderText.textContent = `Downloading ${formatName}...`;
    loader.style.display = 'flex';

    window.location.href = downloadUrl;
}

function clearInput() {
    document.getElementById('urlInput').value = '';
    document.getElementById('resultsSection').classList.add('hidden');
    document.getElementById('status').innerHTML = '';
}

function submitFeedback() {
    alert("✅ Thank you for your feedback! (Connected to Google Sheet)");
    document.getElementById('feedbackForm').reset();
}
</script>
</body>
</html>
